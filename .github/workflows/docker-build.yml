name: Docker Build Validation

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  docker-build-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare env file for compose validation
        run: |
          if [ ! -f .env ] && [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Validate docker-compose config
        run: docker compose -f docker-compose.yml config --no-interpolate >/tmp/docker-compose.rendered.yml

      - name: Validate Docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          tags: job-market-research-agent:ci
